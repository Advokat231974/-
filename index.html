<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Уголовные документы адвоката</title>
<style>
body{
  font-family:"Times New Roman", serif;
  max-width:1000px;
  margin:auto;
  padding:30px 20px 60px;
  background:#fff;
  color:#000;
}
h1{
  text-align:center;
  margin:0 0 24px 0;
  font-size:30px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.full{
  grid-column:1 / -1;
}
label{
  display:block;
  font-weight:bold;
  margin-bottom:6px;
}
input, textarea, select{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  font-family:"Times New Roman", serif;
  font-size:16px;
  border:1px solid #999;
}
textarea{
  min-height:120px;
  resize:vertical;
}
button{
  padding:12px 18px;
  font-size:16px;
  font-family:"Times New Roman", serif;
  cursor:pointer;
  margin:16px 10px 0 0;
}
#preview{
  margin-top:30px;
  border-top:1px solid #aaa;
  padding-top:20px;
  white-space:pre-wrap;
  line-height:1.5;
  text-align:justify;
}
@media (max-width:760px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<h1>Уголовные документы адвоката</h1>

<div class="grid">
  <div class="full">
    <label for="docType">Вид документа</label>
    <select id="docType">
      <option value="appeal_verdict">Апелляционная жалоба на приговор суда</option>
      <option value="appeal_detention">Апелляционная жалоба на постановление об избрании меры пресечения в виде заключения под стражу</option>
      <option value="appeal_extend">Апелляционная жалоба на постановление о продлении срока содержания под стражей</option>
      <option value="complaint_125">Жалоба в порядке статьи 125 УПК РФ</option>
    </select>
  </div>

  <div>
    <label for="targetCourt">Куда подается документ</label>
    <input id="targetCourt">
  </div>

  <div>
    <label for="targetAddress">Адрес суда / органа</label>
    <input id="targetAddress">
  </div>

  <div>
    <label for="throughCourt">Через какой суд / орган</label>
    <input id="throughCourt" placeholder="Например: Тушинский районный суд г. Москвы">
  </div>

  <div>
    <label for="caseNumber">Номер дела / материала</label>
    <input id="caseNumber" placeholder="Например: 1-123/2026">
  </div>

  <div>
    <label for="clientName">ФИО подзащитного / заявителя</label>
    <input id="clientName" placeholder="Например: Иванов Иван Иванович">
  </div>

  <div>
    <label for="clientStatus">Процессуальный статус</label>
    <input id="clientStatus" placeholder="Например: обвиняемого / подозреваемого / заявителя">
  </div>

  <div class="full">
    <label for="titleText">Краткое наименование обжалуемого решения / предмета жалобы</label>
    <input id="titleText">
  </div>

  <div class="full">
    <label for="facts">Фактические обстоятельства</label>
    <textarea id="facts"></textarea>
  </div>

  <div class="full">
    <label for="arguments">Доводы</label>
    <textarea id="arguments"></textarea>
  </div>

  <div class="full">
    <label for="lawRefs">Статьи УПК РФ перед словом «ПРОШУ»</label>
    <input id="lawRefs">
  </div>

  <div class="full">
    <label for="requestText">Просительная часть</label>
    <textarea id="requestText"></textarea>
  </div>
</div>

<button type="button" id="fillBtn">Подставить типовой текст</button>
<button type="button" id="buildBtn">Сформировать</button>
<button type="button" id="wordBtn">Скачать Word</button>

<div id="preview">Пока документ не сформирован.</div>

<script>
const lawyer = {
  name: "Адамова Тажиба Таривердиевича",
  registry: "77/9954",
  address: "127238, г. Москва, Дмитровское шоссе, д. 4, корп. 3, офис 101",
  phone: "+7 (967) 019-78-24",
  email: "adamovtt@yandex.ru"
};

function courtInstrumental(name){
  if(!name) return "суда";
  const map = {
    "Тушинский районный суд г. Москвы": "Тушинским районным судом г. Москвы",
    "Тверской районный суд г. Москвы": "Тверским районным судом г. Москвы",
    "Басманный районный суд г. Москвы": "Басманным районным судом г. Москвы",
    "Мещанский районный суд г. Москвы": "Мещанским районным судом г. Москвы",
    "Пресненский районный суд г. Москвы": "Пресненским районным судом г. Москвы"
  };
  return map[name] || name;
}

const presets = {
  appeal_verdict: {
    targetCourt: "В Судебную коллегию по уголовным делам Московского городского суда",
    targetAddress: "107076, г. Москва, Богородский вал, д. 8",
    title: "АПЕЛЛЯЦИОННАЯ ЖАЛОБА",
    subtitle: "на приговор суда",
    lawRefs: "ст. 389.1, 389.13, 389.15 УПК РФ",
    arguments: "Приговор является незаконным, необоснованным и подлежащим отмене либо изменению. Выводы суда не соответствуют фактическим обстоятельствам дела. Доказательства оценены односторонне, доводы защиты надлежащей оценки не получили.",
    request: "Приговор суда отменить либо изменить. Принять по делу законное, обоснованное и справедливое решение."
  },
  appeal_detention: {
    targetCourt: "В Судебную коллегию по уголовным делам Московского городского суда",
    targetAddress: "107076, г. Москва, Богородский вал, д. 8",
    title: "АПЕЛЛЯЦИОННАЯ ЖАЛОБА",
    subtitle: "на постановление об избрании меры пресечения в виде заключения под стражу",
    lawRefs: "ст. 97, 99, 108, 389.1, 389.13, 389.15 УПК РФ",
    arguments: "Постановление суда является незаконным и необоснованным. Суд не привел достаточных конкретных данных, подтверждающих наличие рисков, предусмотренных статьей 97 УПК РФ. Не проверена возможность применения более мягкой меры пресечения.",
    request: "Постановление суда отменить. Избрать в отношении подзащитного более мягкую меру пресечения, не связанную с заключением под стражу."
  },
  appeal_extend: {
    targetCourt: "В Судебную коллегию по уголовным делам Московского городского суда",
    targetAddress: "107076, г. Москва, Богородский вал, д. 8",
    title: "АПЕЛЛЯЦИОННАЯ ЖАЛОБА",
    subtitle: "на постановление о продлении срока содержания под стражей",
    lawRefs: "ст. 97, 99, 109, 389.1, 389.13, 389.15 УПК РФ",
    arguments: "Постановление является незаконным и необоснованным. Судом не приведено новых обстоятельств, оправдывающих дальнейшее содержание лица под стражей. Возможность применения более мягкой меры пресечения судом надлежащим образом не проверена.",
    request: "Постановление суда о продлении срока содержания под стражей отменить. Избрать более мягкую меру пресечения."
  },
  complaint_125: {
    targetCourt: "В районный суд",
    targetAddress: "",
    title: "ЖАЛОБА",
    subtitle: "в порядке статьи 125 УПК РФ",
    lawRefs: "ст. 123, 125 УПК РФ",
    arguments: "Оспариваемые действия (бездействие) либо решение являются незаконными и необоснованными, нарушают права заявителя и затрудняют доступ к правосудию.",
    request: "Признать действия (бездействие) либо решение незаконными и необоснованными. Обязать устранить допущенное нарушение."
  }
};

function buildFacts(type, throughCourt){
  const courtInst = courtInstrumental(throughCourt);

  if(type === "appeal_verdict"){
    return `Приговором ${courtInst} лицо признано виновным в совершении инкриминируемого деяния. С выводами суда сторона защиты не согласна.`;
  }

  if(type === "appeal_detention"){
    return `Постановлением ${courtInst} в отношении подзащитного избрана мера пресечения в виде заключения под стражу. С данным постановлением сторона защиты не согласна.`;
  }

  if(type === "appeal_extend"){
    return `Постановлением ${courtInst} продлен срок содержания под стражей. С данным постановлением сторона защиты не согласна.`;
  }

  if(type === "complaint_125"){
    return `В ходе досудебного производства были допущены действия (бездействие) либо принято решение, нарушающее права и законные интересы заявителя.`;
  }

  return "";
}

function esc(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function br(str){
  return esc(str).replace(/\n/g,'<br>');
}

function applyPreset(){
  const type = document.getElementById('docType').value;
  const p = presets[type];
  const throughCourt = document.getElementById('throughCourt').value.trim();

  document.getElementById('targetCourt').value = p.targetCourt;
  document.getElementById('targetAddress').value = p.targetAddress;
  document.getElementById('titleText').value = p.subtitle;
  document.getElementById('facts').value = buildFacts(type, throughCourt);
  document.getElementById('arguments').value = p.arguments;
  document.getElementById('lawRefs').value = p.lawRefs;
  document.getElementById('requestText').value = p.request;
}

function buildPlain(){
  const type = document.getElementById('docType').value;
  const p = presets[type];
  const targetCourt = document.getElementById('targetCourt').value.trim();
  const targetAddress = document.getElementById('targetAddress').value.trim();
  const throughCourt = document.getElementById('throughCourt').value.trim();
  const caseNumber = document.getElementById('caseNumber').value.trim();
  const clientName = document.getElementById('clientName').value.trim();
  const titleText = document.getElementById('titleText').value.trim();
  const facts = document.getElementById('facts').value.trim();
  const argumentsText = document.getElementById('arguments').value.trim();
  const lawRefs = document.getElementById('lawRefs').value.trim();
  const requestText = document.getElementById('requestText').value.trim();

  let t = "";

  if(targetCourt) t += targetCourt + "\n";
  if(targetAddress) t += targetAddress + "\n";
  t += "\n";

  if(throughCourt) t += "через " + throughCourt + "\n";
  if(caseNumber) t += "по уголовному делу № " + caseNumber + "\n";
  if(clientName) t += "в защиту интересов: " + clientName + "\n";
  t += "\n";

  t += "от адвоката\n";
  t += lawyer.name + "\n";
  t += "Регистрационный номер в реестре адвокатов АП г. Москвы " + lawyer.registry + "\n";
  t += "адрес для корреспонденции: " + lawyer.address + "\n";
  t += "тел.: " + lawyer.phone + "\n";
  t += "e-mail: " + lawyer.email + "\n\n";

  t += p.title + "\n";
  if(titleText) t += titleText + "\n";
  t += "\n";

  if(facts) t += facts + "\n\n";
  if(argumentsText) t += argumentsText + "\n\n";

  if(lawRefs){
    t += "На основании изложенного и руководствуясь " + lawRefs + ",\n\n";
  }

  t += "ПРОШУ:\n\n";
  t += requestText + "\n\n";
  t += "Дата: «___» __________ 2026 г.\n\n";
  t += "Адвокат __________ Адамов Т.Т.";

  return t;
}

function buildHtmlForWord(){
  const type = document.getElementById('docType').value;
  const p = presets[type];
  const targetCourt = document.getElementById('targetCourt').value.trim();
  const targetAddress = document.getElementById('targetAddress').value.trim();
  const throughCourt = document.getElementById('throughCourt').value.trim();
  const caseNumber = document.getElementById('caseNumber').value.trim();
  const clientName = document.getElementById('clientName').value.trim();
  const titleText = document.getElementById('titleText').value.trim();
  const facts = document.getElementById('facts').value.trim();
  const argumentsText = document.getElementById('arguments').value.trim();
  const lawRefs = document.getElementById('lawRefs').value.trim();
  const requestText = document.getElementById('requestText').value.trim();

  return `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>Документ</title>
<style>
@page { size:A4; margin:2cm 1.5cm 2cm 3cm; }
body{
  font-family:"Times New Roman",serif;
  font-size:14pt;
  line-height:1.5;
}
.right{ text-align:right; margin:0 0 8pt 0; }
.center{ text-align:center; margin:0 0 12pt 0; }
.p{ text-align:justify; text-indent:1.25cm; margin:0 0 12pt 0; }
.noindent{ text-align:justify; margin:0 0 12pt 0; }
.ask{ text-align:center; font-weight:bold; margin:18pt 0 14pt 0; }
</style>
</head>
<body>
  ${targetCourt ? `<p class="right">${br(targetCourt)}</p>` : ``}
  ${targetAddress ? `<p class="right">${br(targetAddress)}</p>` : ``}
  ${throughCourt ? `<p class="right">через ${br(throughCourt)}</p>` : ``}
  ${caseNumber ? `<p class="right">по уголовному делу № ${esc(caseNumber)}</p>` : ``}
  ${clientName ? `<p class="right">в защиту интересов: ${esc(clientName)}</p>` : ``}

  <p class="right">от адвоката<br>
  ${esc(lawyer.name)}<br>
  Регистрационный номер в реестре адвокатов АП г. Москвы ${esc(lawyer.registry)}<br>
  адрес для корреспонденции: ${esc(lawyer.address)}<br>
  тел.: ${esc(lawyer.phone)}<br>
  e-mail: ${esc(lawyer.email)}</p>

  <p class="center"><b>${esc(p.title)}</b></p>
  ${titleText ? `<p class="center"><b>${br(titleText)}</b></p>` : ``}

  ${facts ? `<p class="p">${br(facts)}</p>` : ``}
  ${argumentsText ? `<p class="p">${br(argumentsText)}</p>` : ``}

  ${lawRefs ? `<p class="p">На основании изложенного и руководствуясь ${esc(lawRefs)},</p>` : ``}

  <p class="ask">ПРОШУ:</p>
  <p class="p">${br(requestText)}</p>

  <p class="noindent">Дата: «___» __________ 2026 г.</p>
  <p class="noindent">Адвокат __________ Адамов Т.Т.</p>
</body>
</html>`;
}

document.getElementById('fillBtn').addEventListener('click', applyPreset);
document.getElementById('docType').addEventListener('change', applyPreset);
document.getElementById('throughCourt').addEventListener('input', function(){
  applyPreset();
});

document.getElementById('buildBtn').addEventListener('click', function(){
  document.getElementById('preview').innerText = buildPlain();
});

document.getElementById('wordBtn').addEventListener('click', function(){
  const html = buildHtmlForWord();
  const blob = new Blob(["\ufeff", html], {type:"application/msword"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "ugolovny_dokument.doc";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

applyPreset();
document.getElementById('preview').innerText = "Пока документ не сформирован.";
</script>

</body>
</html>
