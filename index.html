<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор уголовного документа</title>
<style>
body{
  font-family:"Times New Roman", serif;
  max-width:900px;
  margin:auto;
  padding:40px;
  background:#fff;
  color:#000;
}
h1{
  text-align:center;
  margin-bottom:30px;
}
label{
  display:block;
  font-weight:bold;
  margin:12px 0 6px;
}
input, textarea, select{
  width:100%;
  box-sizing:border-box;
  padding:8px;
  font-family:"Times New Roman", serif;
  font-size:16px;
}
textarea{
  min-height:120px;
  resize:vertical;
}
button{
  padding:12px 18px;
  margin:16px 10px 0 0;
  font-size:16px;
  cursor:pointer;
}
#preview{
  margin-top:30px;
  border-top:1px solid #aaa;
  padding-top:20px;
  white-space:pre-wrap;
  line-height:1.5;
}
</style>
</head>
<body>

<h1>Конструктор уголовного документа</h1>

<label for="docType">Вид документа</label>
<select id="docType">
  <option value="Апелляционная жалоба на приговор суда">Апелляционная жалоба на приговор суда</option>
  <option value="Апелляционная жалоба на заключение под стражу">Апелляционная жалоба на заключение под стражу</option>
  <option value="Апелляционная жалоба на продление срока содержания под стражей">Апелляционная жалоба на продление срока содержания под стражей</option>
  <option value="Жалоба в порядке статьи 125 УПК РФ">Жалоба в порядке статьи 125 УПК РФ</option>
</select>

<label for="court">Куда подается</label>
<input id="court" placeholder="Например: В Судебную коллегию по уголовным делам Московского городского суда">

<label for="throughCourt">Через какой суд / орган</label>
<input id="throughCourt" placeholder="Например: через Тушинский районный суд г. Москвы">

<label for="defendant">ФИО подзащитного / заявителя</label>
<input id="defendant" placeholder="Например: Иванов Иван Иванович">

<label for="caseNumber">Номер дела / материала</label>
<input id="caseNumber" placeholder="Например: 1-123/2026">

<label for="text">Доводы</label>
<textarea id="text" placeholder="Изложите доводы"></textarea>

<label for="request">Просительная часть</label>
<textarea id="request" placeholder="Например: постановление отменить"></textarea>

<button type="button" id="fillBtn">Подставить типовой текст</button>
<button type="button" id="genBtn">Сформировать</button>
<button type="button" id="wordBtn">Скачать Word</button>

<div id="preview">Пока документ не сформирован.</div>

<script>
const fillBtn = document.getElementById('fillBtn');
const genBtn = document.getElementById('genBtn');
const wordBtn = document.getElementById('wordBtn');

fillBtn.addEventListener('click', function () {
  const type = document.getElementById('docType').value;

  if (type === 'Апелляционная жалоба на приговор суда') {
    document.getElementById('text').value =
`Приговор считаю незаконным, необоснованным и подлежащим отмене либо изменению.
Выводы суда не соответствуют фактическим обстоятельствам дела.
Судом допущены существенные нарушения уголовного и уголовно-процессуального закона.`;

    document.getElementById('request').value =
`Приговор суда отменить либо изменить.
Принять по делу законное, обоснованное и справедливое решение.`;
  }

  if (type === 'Апелляционная жалоба на заключение под стражу') {
    document.getElementById('text').value =
`Постановление суда считаю незаконным и необоснованным.
Суд не привел конкретных данных, подтверждающих невозможность применения более мягкой меры пресечения.`;

    document.getElementById('request').value =
`Постановление суда отменить.
Избрать более мягкую меру пресечения.`;
  }

  if (type === 'Апелляционная жалоба на продление срока содержания под стражей') {
    document.getElementById('text').value =
`Постановление о продлении срока содержания под стражей считаю незаконным и необоснованным.
Новых обстоятельств, оправдывающих дальнейшее содержание под стражей, судом не приведено.`;

    document.getElementById('request').value =
`Постановление суда отменить.
Избрать более мягкую меру пресечения.`;
  }

  if (type === 'Жалоба в порядке статьи 125 УПК РФ') {
    document.getElementById('text').value =
`Действия (бездействие) либо решение должностного лица нарушают права заявителя и затрудняют доступ к правосудию.`;

    document.getElementById('request').value =
`Признать оспариваемые действия (бездействие) либо решение незаконными и необоснованными.
Обязать устранить допущенное нарушение.`;
  }
});

function buildDoc() {
  const docType = document.getElementById('docType').value.trim();
  const court = document.getElementById('court').value.trim();
  const throughCourt = document.getElementById('throughCourt').value.trim();
  const defendant = document.getElementById('defendant').value.trim();
  const caseNumber = document.getElementById('caseNumber').value.trim();
  const text = document.getElementById('text').value.trim();
  const request = document.getElementById('request').value.trim();

  return `${court}

${throughCourt}

от адвоката
Адамова Тажиба Таривердиевича
регистрационный номер в реестре адвокатов АП г. Москвы 77/9954
адрес для корреспонденции: 127238, г. Москва, Дмитровское шоссе, д. 4, корп. 3, офис 101
тел.: +7 (967) 019-78-24
e-mail: adamovtt@yandex.ru

в интересах: ${defendant}

${docType}

по делу / материалу № ${caseNumber}

${text}

ПРОШУ:

${request}

Дата: ____________

Адвокат
Адамов Т.Т.`;
}

genBtn.addEventListener('click', function () {
  document.getElementById('preview').innerText = buildDoc();
});

wordBtn.addEventListener('click', function () {
  const doc = buildDoc();
  const html = `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>Документ</title>
<style>
body{
  font-family:"Times New Roman", serif;
  font-size:14pt;
  line-height:1.5;
  margin:2cm 1.5cm 2cm 3cm;
  white-space:pre-wrap;
}
</style>
</head>
<body>${doc.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</body>
</html>`;

  const blob = new Blob(["\ufeff", html], { type: "application/msword" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "ugolovny_dokument.doc";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});
</script>

</body>
</html>
