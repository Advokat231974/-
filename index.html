<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Конструктор апелляционной жалобы</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Составление апелляционной жалобы</h1>
      <p class="subtitle">Заполните форму и нажмите «Сформировать документ».</p>

      <form id="appeal-form" class="appeal-form">
        <label for="court">Данные суда</label>
        <textarea id="court" name="court" rows="3" placeholder="Например: Московский городской суд" required></textarea>

        <label for="defendant">Данные подсудимого</label>
        <textarea id="defendant" name="defendant" rows="3" placeholder="ФИО, дата рождения, адрес" required></textarea>

        <label for="case-number">Номер дела</label>
        <input id="case-number" name="caseNumber" type="text" placeholder="Например: 12-345/2026" required />

        <label for="complaint-text">Текст жалобы</label>
        <textarea id="complaint-text" name="complaintText" rows="8" placeholder="Изложите доводы апелляционной жалобы" required></textarea>

        <button type="submit">Сформировать документ</button>
      </form>

      <section class="result" aria-live="polite">
        <h2>Сформированный документ</h2>
        <pre id="output">Пока документ не сформирован.</pre>
      </section>
    </main>

    <script>
document.getElementById("appeal-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const court = document.getElementById("court").value;
  const defendant = document.getElementById("defendant").value;
  const caseNumber = document.getElementById("case-number").value;
  const complaintText = document.getElementById("complaint-text").value;

  const result = `
АПЕЛЛЯЦИОННАЯ ЖАЛОБА

В суд: ${court}

Подсудимый: ${defendant}

Номер дела: ${caseNumber}

ДОВОДЫ ЖАЛОБЫ:

${complaintText}
`;

  document.getElementById("output").textContent = result;
});
</script>  </body>
</html>
