!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Конструктор процессуального документа</title>

<style>
body{
font-family:"Times New Roman";
max-width:900px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
}

input, textarea{
width:100%;
margin-bottom:15px;
padding:8px;
font-family:"Times New Roman";
}

textarea{
height:120px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Конструктор процессуального документа</h1>

<label>Куда подается документ</label>
<input id="court">

<label>Через какой суд</label>
<input id="throughCourt">

<label>ФИО подзащитного</label>
<input id="defendant">

<label>Номер дела</label>
<input id="caseNumber">

<label>Доводы жалобы</label>
<textarea id="text"></textarea>

<label>Просительная часть</label>
<textarea id="request"></textarea>

<button onclick="generate()">Сформировать и скачать Word</button>

<script>

function generate(){

let court=document.getElementById("court").value
let throughCourt=document.getElementById("throughCourt").value
let defendant=document.getElementById("defendant").value
let caseNumber=document.getElementById("caseNumber").value
let text=document.getElementById("text").value
let request=document.getElementById("request").value

let doc=
`В ${court}

через ${throughCourt}

от адвоката
Адамова Тажиба Таривердиевича
реестровый номер АП г. Москвы 77/9954
тел.: +7 (967) 019-78-24
email: adamovtt@yandex.ru


АПЕЛЛЯЦИОННАЯ ЖАЛОБА

по делу № ${caseNumber}

В отношении: ${defendant}

${text}


ПРОШУ:

${request}


Адвокат
Адамов Т.Т.
`

let blob=new Blob(['\ufeff',doc],{type:'application/msword'})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="document.doc"

link.click()

}

</script>

</body>
</html>
