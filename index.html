    select,
    textarea {
      width: 100%;

      font-size: 16px;
      background: #fff;

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      padding: 12px 18px;
      border: 1px solid #444;
      background: #f2f2f2;
      font-family: "Times New Roman", serif;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #e8e8e8;
    }

    .preview-wrap {
      margin-top: 28px;
      border-top: 1px solid #bbb;
      padding-top: 22px;
    }

    .preview-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    #preview {
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14pt;
    }

    .hint {
      color: #333;
      font-size: 14px;
      margin-top: 4px;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Конструктор уголовных документов</h1>

    <div class="grid">
      <div class="full">
        <label for="docType">Вид документа</label>

      };
      return map[type] || "";
    }

    function getTemplateArguments(type) {
      const map = {
        appeal_verdict:
`Выводы суда не соответствуют фактическим обстоятельствам дела.

      };
      return map[type] || "";

    function fillTemplate() {
      const type = document.getElementById("docType").value;
      const essence = document.getElementById("essence");
      const facts = document.getElementById("facts");
      const argumentsField = document.getElementById("arguments");
      const requestText = document.getElementById("requestText");

      if (!essence.value.trim()) essence.value = getDefaultEssence(type);
      if (!facts.value.trim()) facts.value = getTemplateFacts(type);
      if (!argumentsField.value.trim()) argumentsField.value = getTemplateArguments(type);
      if (!requestText.value.trim()) requestText.value = getTemplateRequest(type);
    }

      <div class="btn-row">
        <button type="button" onclick="generateDocument()">Сформировать</button>
        <button type="button" onclick="downloadWord()">Скачать Word</button>
        <button type="button" onclick="copyText()">Копировать текст</button>
      </div>
    </div>

    <div class="card">
      <div class="preview-title">Сформированный документ</div>
      <div id="preview">Нажмите «Сформировать».</div>
    </div>
  </div>

  <script>
    const LAWYER_BLOCK =
`от адвоката Адамова Тажиба Таривердиевича
Регистрационный номер в реестре адвокатов АП г. Москвы 77/9954
адрес для корреспонденции: 127238, г. Москва, Дмитровское шоссе, д. 4, корп. 3, офис 101
тел.: +7 (967) 019-78-24
e-mail: adamovtt@yandex.ru`;

    function setDefaults(type) {
      const title = document.getElementById("documentTitle");
      const circumstances = document.getElementById("circumstances");
      const requestPart = document.getElementById("requestPart");

      if (type === "appeal_verdict") {
        title.value = "АПЕЛЛЯЦИОННАЯ ЖАЛОБА\nна приговор суда";
        circumstances.value =
`Приговор суда считаю незаконным, необоснованным и подлежащим отмене либо изменению.
Выводы суда не в полной мере соответствуют фактическим обстоятельствам дела.
При постановлении приговора были допущены существенные нарушения уголовного и уголовно-процессуального закона.
Оценка доказательств является неполной и односторонней.`;
        requestPart.value =
`Приговор отменить либо изменить.
Принять по делу законное, обоснованное и справедливое решение.`;
      }

      if (type === "appeal_detention") {
        title.value = "АПЕЛЛЯЦИОННАЯ ЖАЛОБА\nна постановление суда об избрании меры пресечения в виде заключения под стражу";
        circumstances.value =
`Постановление суда считаю незаконным и необоснованным.
Суд не привел достаточных конкретных данных, подтверждающих невозможность применения более мягкой меры пресечения.
Риски, предусмотренные статьей 97 УПК РФ, надлежащим образом не подтверждены.
Судом не дана должная оценка данным о личности и иным значимым обстоятельствам.`;
        requestPart.value =
`Постановление суда отменить.
Избрать более мягкую меру пресечения, не связанную с заключением под стражу.`;
      }

      if (type === "appeal_extension") {
        title.value = "АПЕЛЛЯЦИОННАЯ ЖАЛОБА\nна постановление суда о продлении срока содержания под стражей";
        circumstances.value =
`Постановление о продлении срока содержания под стражей считаю незаконным и необоснованным.
Судом не приведено новых обстоятельств, оправдывающих дальнейшее содержание под стражей.
Доводы стороны обвинения носят общий характер и не подтверждены конкретными материалами.
Суд не проверил возможность изменения меры пресечения на более мягкую.`;
        requestPart.value =
`Постановление суда о продлении срока содержания под стражей отменить.
Избрать в отношении подзащитного более мягкую меру пресечения.`;
      }

      if (type === "complaint_125") {
        title.value = "ЖАЛОБА\nв порядке статьи 125 УПК РФ";
        circumstances.value =
`Считаю действия (бездействие) и (или) решение должностного лица незаконными и нарушающими права заявителя.
Оспариваемое решение препятствует доступу к правосудию и нарушает права, гарантированные уголовно-процессуальным законом.
Доводы жалобы подтверждаются приложенными материалами.`;
        requestPart.value =
`Признать оспариваемые действия (бездействие) или решение незаконными и необоснованными.
Обязать устранить допущенное нарушение.`;
      }
    }

    function onDocumentTypeChange() {
      setDefaults(document.getElementById("docType").value);
      generateDocument();
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function getDocText() {
      const targetCourt = document.getElementById("targetCourt").value.trim();
      const throughCourt = document.getElementById("throughCourt").value.trim();
      const clientName = document.getElementById("clientName").value.trim();
      const caseNumber = document.getElementById("caseNumber").value.trim();
      const documentTitle = document.getElementById("documentTitle").value.trim();
      const circumstances = document.getElementById("circumstances").value.trim();
      const requestPart = document.getElementById("requestPart").value.trim();
      const attachments = document.getElementById("attachments").value.trim();

      let text = "";

      if (targetCourt) {
        text += targetCourt + "\n";
      }

      text += "\n";

      if (throughCourt) {
        text += throughCourt + "\n";
      }

      text += "\n";
      text += LAWYER_BLOCK + "\n\n";

      if (clientName) {
        text += "в интересах: " + clientName + "\n\n";
      }

      text += documentTitle + "\n\n";

      if (caseNumber) {
        text += "по делу / материалу № " + caseNumber + "\n\n";
      }

      if (clientName) {
        text += "В отношении: " + clientName + "\n\n";
      }

      if (circumstances) {
        text += circumstances + "\n\n";
      }

      text += "ПРОШУ:\n\n";

      if (requestPart) {
        text += requestPart + "\n\n";
      }

      if (attachments) {
        text += "Приложение:\n" + attachments + "\n\n";
      }

      text += "Дата: ____________\n\n";
      text += "Адвокат\nАдамов Т.Т.";

      return text;
    }

    function generateDocument() {
      const text = getDocText();
      document.getElementById("preview").innerText = text;
    }

    function copyText() {
      const text = getDocText();
      navigator.clipboard.writeText(text)
        .then(() => alert("Текст скопирован"))
        .catch(() => alert("Не удалось скопировать"));
    }

    function downloadWord() {
      const targetCourt = document.getElementById("targetCourt").value.trim();
      const throughCourt = document.getElementById("throughCourt").value.trim();
      const clientName = document.getElementById("clientName").value.trim();
      const caseNumber = document.getElementById("caseNumber").value.trim();
      const documentTitle = document.getElementById("documentTitle").value.trim().replace(/\n/g, "<br>");
      const circumstances = document.getElementById("circumstances").value.trim().replace(/\n/g, "<br>");
      const requestPart = document.getElementById("requestPart").value.trim().replace(/\n/g, "<br>");
      const attachmentsRaw = document.getElementById("attachments").value.trim();

      let attachmentsHtml = "";
      if (attachmentsRaw) {
        const items = attachmentsRaw.split("\n").map(item => item.trim()).filter(Boolean);
        attachmentsHtml = "<p><b>Приложение:</b></p><p>" + items.map(escapeHtml).join("<br>") + "</p>";
      }

      const html =
`<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>Документ</title>
<style>
body{
  font-family:"Times New Roman", serif;
  font-size:14pt;
  line-height:1.5;
  margin:2cm 1.5cm 2cm 3cm;
}
.right{
  text-align:right;
}
.center{
  text-align:center;
}
.justify{
  text-align:justify;
  text-indent:1.25cm;
}
.block{
  margin-bottom:12pt;
}
</style>
</head>
<body>
  <div class="right block">${escapeHtml(targetCourt || "")}</div>
  <div class="right block">${escapeHtml(throughCourt || "")}</div>
  <div class="right block">
    от адвоката Адамова Тажиба Таривердиевича<br>
    Регистрационный номер в реестре адвокатов АП г. Москвы 77/9954<br>
    адрес для корреспонденции: 127238, г. Москва, Дмитровское шоссе, д. 4, корп. 3, офис 101<br>
    тел.: +7 (967) 019-78-24<br>
    e-mail: adamovtt@yandex.ru
  </div>
  ${clientName ? `<div class="right block">в интересах: ${escapeHtml(clientName)}</div>` : ""}
  <div class="center block"><b>${documentTitle}</b></div>
  ${caseNumber ? `<p class="justify block">по делу / материалу № ${escapeHtml(caseNumber)}</p>` : ""}
  ${clientName ? `<p class="justify block">В отношении: ${escapeHtml(clientName)}</p>` : ""}
  <p class="justify block">${circumstances || ""}</p>
  <div class="center block"><b>ПРОШУ:</b></div>
  <p class="justify block">${requestPart || ""}</p>
  ${attachmentsHtml}
  <p class="block">Дата: ____________</p>
  <p class="block">Адвокат<br>Адамов Т.Т.</p>
</body>
</html>`;

      const blob = new Blob(["\ufeff", html], { type: "application/msword" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "ugolovny_dokument.doc";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    setDefaults(document.getElementById("docType").value);
    generateDocument();
  </script>
</body>
</html>
