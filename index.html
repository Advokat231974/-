<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Уголовные документы адвоката</title>
<style>
  body{
    font-family:"Times New Roman",serif;
    background:#fff;
    color:#000;
    margin:0;
    padding:24px;
  }
  .wrap{
    max-width:1000px;
    margin:0 auto;
  }
  h1{
    text-align:center;
    margin:0 0 24px 0;
    font-size:30px;
  }
  .box{
    border:1px solid #cfcfcf;
    border-radius:8px;
    padding:18px;
    margin-bottom:22px;
    background:#fafafa;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px 18px;
  }
  .full{
    grid-column:1 / -1;
  }
  label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
  }
  input, select, textarea{
    width:100%;
    box-sizing:border-box;
    padding:10px;
    font-family:"Times New Roman",serif;
    font-size:16px;
    border:1px solid #999;
    border-radius:4px;
    background:#fff;
  }
  textarea{
    min-height:120px;
    resize:vertical;
  }
  .btns{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:8px;
  }
  button{
    padding:12px 18px;
    font-family:"Times New Roman",serif;
    font-size:16px;
    border:1px solid #666;
    border-radius:4px;
    background:#f1f1f1;
    cursor:pointer;
  }
  button:hover{
    background:#e6e6e6;
  }
  .preview-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:14px;
  }
  #preview{
    white-space:pre-wrap;
    line-height:1.5;
    text-align:justify;
    background:#fff;
    border:1px solid #ccc;
    padding:20px;
    min-height:260px;
  }
  .mini{
    font-size:14px;
    color:#444;
    margin-top:4px;
  }
  @media (max-width:780px){
    .grid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Уголовные документы адвоката</h1>

  <div class="box">
    <div class="grid">
      <div class="full">
        <label for="docType">Вид документа</label>
        <select id="docType" onchange="applyDocPreset()">
          <option value="appeal_verdict">Апелляционная жалоба на приговор суда</option>
          <option value="appeal_detention">Апелляционная жалоба на постановление об избрании меры пресечения в виде заключения под стражу</option>
          <option value="appeal_extend_detention">Апелляционная жалоба на постановление о продлении срока содержания под стражей</option>
          <option value="complaint_125">Жалоба в порядке статьи 125 УПК РФ</option>
          <option value="motion_investigator">Ходатайство следователю</option>
          <option value="motion_court">Ходатайство в суд</option>
          <option value="complaint_prosecutor">Жалоба прокурору</option>
          <option value="motion_attach">Ходатайство о приобщении документов</option>
          <option value="motion_acquaint">Ходатайство об ознакомлении с материалами</option>
          <option value="speech_debate">Тезисы для прений стороны защиты</option>
        </select>
      </div>

      <div>
        <label for="targetCourt">Куда подается документ</label>
        <input id="targetCourt" list="targets" placeholder="Например: В Судебную коллегию по уголовным делам Московского городского суда">
        <datalist id="targets">
          <option value="В Судебную коллегию по уголовным делам Московского городского суда">
          <option value="В районный суд">
          <option value="Прокурору города Москвы">
          <option value="Прокурору района">
          <option value="Руководителю следственного органа">
          <option value="Следователю">
        </datalist>
      </div>

      <div>
        <label for="targetAddress">Адрес адресата</label>
        <input id="targetAddress" placeholder="Например: 107076, г. Москва, Богородский вал, д. 8">
      </div>

      <div>
        <label for="throughCourt">Через какой суд / орган</label>
        <input id="throughCourt" list="moscowCourts" placeholder="Например: через Тушинский районный суд г. Москвы">
        <datalist id="moscowCourts">
          <option value="через Басманный районный суд г. Москвы">
          <option value="через Бабушкинский районный суд г. Москвы">
          <option value="через Бутырский районный суд г. Москвы">
          <option value="через Гагаринский районный суд г. Москвы">
          <option value="через Головинский районный суд г. Москвы">
          <option value="через Дорогомиловский районный суд г. Москвы">
          <option value="через Замоскворецкий районный суд г. Москвы">
          <option value="через Зеленоградский районный суд г. Москвы">
          <option value="через Зюзинский районный суд г. Москвы">
          <option value="через Измайловский районный суд г. Москвы">
          <option value="через Коптевский районный суд г. Москвы">
          <option value="через Кузьминский районный суд г. Москвы">
          <option value="через Кунцевский районный суд г. Москвы">
          <option value="через Лефортовский районный суд г. Москвы">
          <option value="через Люблинский районный суд г. Москвы">
          <option value="через Мещанский районный суд г. Москвы">
          <option value="через Мещанский районный суд г. Москвы">
          <option value="через Мосгорсуд">
          <option value="через Нагатинский районный суд г. Москвы">
          <option value="через Никулинский районный суд г. Москвы">
          <option value="через Останкинский районный суд г. Москвы">
          <option value="через Перовский районный суд г. Москвы">
          <option value="через Преображенский районный суд г. Москвы">
          <option value="через Пресненский районный суд г. Москвы">
          <option value="через Савеловский районный суд г. Москвы">
          <option value="через Симоновский районный суд г. Москвы">
          <option value="через Солнцевский районный суд г. Москвы">
          <option value="через Таганский районный суд г. Москвы">
          <option value="через Тверской районный суд г. Москвы">
          <option value="через Тимирязевский районный суд г. Москвы">
          <option value="через Троицкий районный суд г. Москвы">
          <option value="через Тушинский районный суд г. Москвы">
          <option value="через Хамовнический районный суд г. Москвы">
          <option value="через Хорошевский районный суд г. Москвы">
          <option value="через Черемушкинский районный суд г. Москвы">
          <option value="через Чертановский районный суд г. Москвы">
          <option value="через Щербинский районный суд г. Москвы">
        </datalist>
      </div>

      <div>
        <label for="caseNumber">Номер дела / материала</label>
        <input id="caseNumber" placeholder="Например: 1-123/2026">
      </div>

      <div>
        <label for="clientName">ФИО подзащитного / заявителя</label>
        <input id="clientName" placeholder="Например: Иванов Иван Иванович">
      </div>

      <div>
        <label for="clientStatus">Процессуальный статус</label>
        <input id="clientStatus" placeholder="Например: обвиняемый / подозреваемый / заявитель">
      </div>

      <div class="full">
        <label for="titleText">Заголовок документа</label>
        <input id="titleText" placeholder="Например: на приговор Тушинского районного суда г. Москвы от 01.03.2026">
      </div>

      <div class="full">
        <label for="facts">Обстоятельства</label>
        <textarea id="facts" placeholder="Кратко изложите обстоятельства"></textarea>
      </div>

      <div class="full">
        <label for="arguments">Доводы</label>
        <textarea id="arguments" placeholder="Изложите доводы"></textarea>
      </div>

      <div class="full">
        <label for="requestText">Просительная часть</label>
        <textarea id="requestText" placeholder="Например: постановление суда отменить, избрать более мягкую меру пресечения"></textarea>
      </div>

      <div class="full">
        <label for="attachments">Приложения</label>
        <textarea id="attachments" placeholder="Каждое приложение с новой строки"></textarea>
        <div class="mini">Например: Копия ордера, копия постановления, характеристика, медицинские документы.</div>
      </div>
    </div>

    <div class="btns">
      <button type="button" onclick="applyDocPreset()">Подставить шаблон</button>
      <button type="button" onclick="generateDocument()">Сформировать</button>
      <button type="button" onclick="downloadWord()">Скачать Word</button>
      <button type="button" onclick="copyText()">Копировать текст</button>
      <button type="button" onclick="clearForm()">Очистить</button>
    </div>
  </div>

  <div class="box">
    <div class="preview-title">Предпросмотр</div>
    <div id="preview">Нажмите «Сформировать».</div>
  </div>
</div>

<script>

function applyDocPreset(){
  const type = document.getElementById("docType").value;
  const p = presets[type];
  if(!p) return;

  document.getElementById("targetCourt").value = p.targetCourt || "";
  document.getElementById("targetAddress").value = p.targetAddress || "";
  document.getElementById("titleText").value = p.titleText || "";
  document.getElementById("facts").value = p.facts || "";
  document.getElementById("arguments").value = p.arguments || "";
  document.getElementById("requestText").value = p.requestText || "";
}

function buildDocumentText(){
  const targetCourt = document.getElementById("targetCourt").value.trim();
  const targetAddress = document.getElementById("targetAddress").value.trim();
  const throughCourt = document.getElementById("throughCourt").value.trim();
  const caseNumber = document.getElementById("caseNumber").value.trim();
  const clientName = document.getElementById("clientName").value.trim();
  const clientStatus = document.getElementById("clientStatus").value.trim();
  const titleText = document.getElementById("titleText").value.trim();
  const facts = document.getElementById("facts").value.trim();
  const argumentsText = document.getElementById("arguments").value.trim();
  const requestText = document.getElementById("requestText").value.trim();
  const attachments = document.getElementById("attachments").value.trim();

  let out = "";

  if(targetCourt) out += targetCourt + "\n";
  if(targetAddress) out += targetAddress + "\n";
  out += "\n";

  if(throughCourt) out += throughCourt + "\n\n";

  out += ADVOCATE_BLOCK + "\n\n";

  if(clientStatus || clientName){
    out += "в интересах: " + (clientStatus ? clientStatus + " " : "") + (clientName || "") + "\n\n";
  }

  if(titleText) out += titleText + "\n\n";

  if(caseNumber) out += "по делу / материалу № " + caseNumber + "\n\n";

  if(clientName) out += "В отношении: " + clientName + "\n\n";

  if(facts) out += facts + "\n\n";
  if(argumentsText) out += argumentsText + "\n\n";

  out += "ПРОШУ:\n\n";
  out += (requestText || "Разрешить вопрос в соответствии с доводами настоящего документа.") + "\n\n";

  if(attachments){
    out += "Приложение:\n" + attachments + "\n\n";
  }

  out += "Дата: ____________\n\n";
  out += "Адвокат\nАдамов Т.Т.";

  return out;
}

function generateDocument(){
  document.getElementById("preview").innerText = buildDocumentText();
}

function copyText(){
  const text = buildDocumentText();
  navigator.clipboard.writeText(text).then(function(){
    alert("Текст скопирован");
  }).catch(function(){
    alert("Не удалось скопировать");
  });
}

function clearForm(){
  document.getElementById("throughCourt").value = "";
  document.getElementById("caseNumber").value = "";
  document.getElementById("clientName").value = "";
  document.getElementById("clientStatus").value = "";
  document.getElementById("attachments").value = "";
  applyDocPreset();
  document.getElementById("preview").innerText = "Нажмите «Сформировать».";
}

function escapeHtml(str){
  return str
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function downloadWord(){
  const plain = buildDocumentText();
  const html =
`<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>Документ</title>
<style>
body{
  font-family:"Times New Roman",serif;
  font-size:14pt;
  line-height:1.5;
  margin:2cm 1.5cm 2cm 3cm;
  white-space:pre-wrap;
}
</style>
</head>
<body>${escapeHtml(plain)}</body>
</html>`;

  const blob = new Blob(["\ufeff", html], { type: "application/msword" });
