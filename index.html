function buildFacts(type, throughCourt, clientName){
  const inst = courtInstrumental(throughCourt);
  const gen = courtGenitive(throughCourt);
  const person = clientName || "подзащитного";

  if(type === "appeal_verdict"){
    return `Приговором ${inst} лицо признано виновным в совершении инкриминируемого деяния. С выводами ${gen} сторона защиты не согласна.`;
  }

  if(type === "appeal_detention"){
    return `Постановлением ${inst} в отношении ${person} избрана мера пресечения в виде заключения под стражу. С данным постановлением ${gen} сторона защиты не согласна.`;
  }

  if(type === "appeal_extend"){
    return `Постановлением ${inst} продлен срок содержания ${person} под стражей. С данным постановлением ${gen} сторона защиты не согласна.`;
  }

  if(type === "complaint_125"){
    return `В ходе досудебного производства были допущены действия (бездействие) либо принято решение, нарушающее права и законные интересы заявителя.`;
  }

  return "";
}

function esc(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function br(str){
  return esc(str).replace(/\n/g,"<br>");
}

  document.getElementById("facts").value = buildFacts(type, throughCourt, clientName);
  document.getElementById("arguments").value = p.arguments;
  document.getElementById("lawRefs").value = p.lawRefs;
  document.getElementById("requestText").value = p.request;
}

function buildPlain(){
  const type = document.getElementById("docType").value;

  const argumentsText = document.getElementById("arguments").value.trim();
  const lawRefs = document.getElementById("lawRefs").value.trim();
  const requestText = document.getElementById("requestText").value.trim();

  let t = "";

  if(targetCourt) t += targetCourt + "\n";
  if(targetAddress) t += targetAddress + "\n";
  t += "\n";

  t += "тел.: " + lawyer.phone + "\n";
  t += "e-mail: " + lawyer.email + "\n\n";

  t += p.title + "\n";
  if(titleText) t += titleText + "\n";
  t += "\n";

  if(facts) t += facts + "\n\n";
  if(argumentsText) t += argumentsText + "\n\n";

  if(lawRefs){

  t += "Дата: «___» __________ 2026 г.\n\n";
  t += "Адвокат __________ Адамов Т.Т.";

});

  const html = buildHtmlForWord();
  const blob = new Blob(["\\ufeff", html], {type:"application/msword"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "ugolovny_dokument.doc";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});
